<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You Got This — a random affirmation</title>
  <meta name="description" content="A little reminder, picked at random, that you've got this.">
  <!-- Emoji favicon (inline SVG data URI — no external request) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%AA%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      /* "Serene Nature" palette — botanical greens + misty sky */
      --bg-from: #a6cbd3;      /* misty sky */
      --bg-to:   #96ab88;      /* sage green */
      --card-bg: #fdf1db;      /* warm cream */
      --card-border: #dfd5c6;  /* soft taupe edge */
      --ink: #597b60;          /* forest green — affirmation is large text, passes AA (>3:1) */
      --ink-soft: #4f7059;     /* deeper forest — small label text, passes AA (~5:1 on cream) */
      --accent: #597b60;       /* forest green button — white text passes AA (~4.7:1) */
      --accent-hover: #4a6a52; /* darker forest on hover */
      --focus: #4f8fa8;        /* teal focus ring */
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      /* Serene gradient: misty sky settling into sage */
      background: linear-gradient(160deg, var(--bg-from) 0%, var(--bg-to) 100%);
      background-size: 180% 180%;
      animation: drift 32s ease infinite;   /* slow, gentle */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100vh;
    }

    @keyframes drift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Subtle botanical leaf-sprig texture behind the card.
       Fixed layer above the gradient but below the content card. */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20width%3D%2780%27%20height%3D%2780%27%20viewBox%3D%270%200%2080%2080%27%3E%3Cg%20fill%3D%27none%27%20stroke%3D%27%23ffffff%27%20stroke-width%3D%271.3%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27%20transform%3D%27rotate%28-22%2040%2040%29%27%3E%3Cpath%20d%3D%27M40%2058%20C30%2048%2030%2030%2040%2020%20C50%2030%2050%2048%2040%2058%20Z%27%20stroke-width%3D%271.8%27%2F%3E%3Cpath%20d%3D%27M40%2056%20L40%2022%27%2F%3E%3Cpath%20d%3D%27M40%2048%20L33.5%2042%27%2F%3E%3Cpath%20d%3D%27M40%2048%20L46.5%2042%27%2F%3E%3Cpath%20d%3D%27M40%2040%20L32.5%2033%27%2F%3E%3Cpath%20d%3D%27M40%2040%20L47.5%2033%27%2F%3E%3Cpath%20d%3D%27M40%2032%20L34%2027%27%2F%3E%3Cpath%20d%3D%27M40%2032%20L46%2027%27%2F%3E%3Cpath%20d%3D%27M40%2058%20L40%2065%27%2F%3E%3C%2Fg%3E%3C%2Fsvg%3E");
      background-size: 80px 80px;
      opacity: 0.32;       /* a whisper of foliage, not a focal point */
    }

    main {
      position: relative;
      z-index: 1;          /* sit above the pattern layer */
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: 0 14px 40px rgba(55, 80, 65, 0.18);
      padding: clamp(28px, 6vw, 56px);
      max-width: 620px;
      width: 100%;
      text-align: center;
    }

    .kicker {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--ink-soft);
      margin: 0 0 18px;
    }

    .affirmation {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      line-height: 1.3;
      font-weight: 700;
      margin: 0 0 36px;
      min-height: 2.6em;            /* reduces layout jump between affirmations */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .affirmation.fade {
      animation: fadein 0.5s ease;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    button {
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      color: #ffffff;
      background: var(--accent);
      border: none;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 1.05rem;
      transition: background-color 0.2s ease, transform 0.05s ease;
    }

    button:hover { background: var(--accent-hover); }
    button:active { transform: scale(0.98); }
    button[disabled] { opacity: 0.5; cursor: default; }

    /* Clear, visible keyboard focus indicator (WCAG 2.4.7) */
    button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    /* Screen-reader-only utility for the document heading */
    .visually-hidden {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
      border: 0;
    }

    /* Honor users who prefer reduced motion (WCAG 2.3.3) */
    @media (prefers-reduced-motion: reduce) {
      body { animation: none; }
      .affirmation.fade { animation: none; }
      button { transition: none; }
    }
  </style>
</head>
<body>
  <main>
    <h1 class="visually-hidden">You Got This — random affirmations</h1>
    <p class="kicker">A reminder for you</p>

    <!-- aria-live announces a new affirmation to screen readers when the button is pressed -->
    <p id="affirmation" class="affirmation" aria-live="polite" role="status"></p>

    <button id="another" type="button">Give me another</button>
  </main>

  <script>
    const el = document.getElementById("affirmation");
    const button = document.getElementById("another");
    const STORAGE_KEY = "lastAffirmationIndex";

    let affirmations = [];

    // Read the last shown index so we don't repeat it on the next reload either.
    let lastIndex = -1;
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored !== null) lastIndex = parseInt(stored, 10);
    } catch (e) { /* localStorage may be unavailable; fall back to in-memory only */ }

    function pickIndex() {
      if (affirmations.length <= 1) return 0;
      let i;
      do {
        i = Math.floor(Math.random() * affirmations.length);
      } while (i === lastIndex);   // no-repeat: never the same one twice in a row
      return i;
    }

    function show(animate) {
      const i = pickIndex();
      lastIndex = i;
      try { localStorage.setItem(STORAGE_KEY, String(i)); } catch (e) { /* ignore */ }

      el.textContent = affirmations[i];
      if (animate) {
        el.classList.remove("fade");
        void el.offsetWidth;        // restart the CSS animation
        el.classList.add("fade");
      }
    }

    button.addEventListener("click", () => show(true));
    button.disabled = true;        // re-enabled once affirmations have loaded

    // Affirmations live in affirmations.json so the list is easy to edit
    // without touching code. (Loaded over HTTP on GitHub Pages.)
    fetch("affirmations.json")
      .then((res) => {
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.json();
      })
      .then((data) => {
        affirmations = Array.isArray(data) ? data : (data.affirmations || []);
        if (!affirmations.length) throw new Error("No affirmations found");
        button.disabled = false;
        show(false);
      })
      .catch((err) => {
        console.error("Could not load affirmations.json:", err);
        el.textContent = "You've got this.";   // graceful fallback
      });
  </script>
</body>
</html>
